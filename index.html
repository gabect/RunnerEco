<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Horizontal Runner Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #101827;
      font-family: Arial, sans-serif;
      color: white;
    }

    .game-wrapper {
      text-align: center;
    }

    h1 {
      margin-bottom: 12px;
      font-size: 28px;
    }

    canvas {
      background: linear-gradient(#1e3a5f, #72b7e8);
      border: 4px solid white;
      border-radius: 12px;
      display: block;
    }

    .instructions {
      margin-top: 12px;
      font-size: 16px;
      color: #d7e4f2;
    }
  </style>
</head>
<body>
  <div class="game-wrapper">
    <h1>Horizontal Runner</h1>
    <canvas id="gameCanvas" width="900" height="450"></canvas>
    <p class="instructions">Press SPACE or ↑ to jump. Press R to restart.</p>
  </div>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    const gravity = 0.8;
    const groundHeight = 80;
    const groundY = canvas.height - groundHeight;

    let gameRunning = true;
    let score = 0;
    let speed = 6;
    let frame = 0;

    const player = {
      x: 100,
      y: groundY - 50,
      width: 50,
      height: 50,
      velocityY: 0,
      jumpPower: -16,
      onGround: true
    };

    const obstacle = {
      x: canvas.width + 100,
      y: groundY - 45,
      width: 40,
      height: 45
    };

    const clouds = [
      { x: 150, y: 70, size: 40 },
      { x: 500, y: 110, size: 30 },
      { x: 800, y: 60, size: 45 }
    ];

    function jump() {
      if (player.onGround && gameRunning) {
        player.velocityY = player.jumpPower;
        player.onGround = false;
      }
    }

    function restartGame() {
      gameRunning = true;
      score = 0;
      speed = 6;
      frame = 0;

      player.y = groundY - player.height;
      player.velocityY = 0;
      player.onGround = true;

      obstacle.x = canvas.width + 100;
    }

    document.addEventListener("keydown", function(event) {
      if (event.code === "Space" || event.code === "ArrowUp") {
        jump();
      }

      if (event.code === "KeyR") {
        restartGame();
      }
    });

    canvas.addEventListener("click", jump);

    function isColliding(a, b) {
      return (
        a.x < b.x + b.width &&
        a.x + a.width > b.x &&
        a.y < b.y + b.height &&
        a.y + a.height > b.y
      );
    }

    function update() {
      if (!gameRunning) return;

      frame++;

      player.velocityY += gravity;
      player.y += player.velocityY;

      if (player.y >= groundY - player.height) {
        player.y = groundY - player.height;
        player.velocityY = 0;
        player.onGround = true;
      }

      obstacle.x -= speed;

      if (obstacle.x + obstacle.width < 0) {
        obstacle.x = canvas.width + Math.random() * 300 + 100;
        score++;

        if (speed < 13) {
          speed += 0.3;
        }
      }

      clouds.forEach(cloud => {
        cloud.x -= speed * 0.25;
        if (cloud.x < -100) {
          cloud.x = canvas.width + 100;
          cloud.y = Math.random() * 100 + 30;
        }
      });

      if (isColliding(player, obstacle)) {
        gameRunning = false;
      }
    }

    function drawCloud(x, y, size) {
      ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
      ctx.beginPath();
      ctx.arc(x, y, size * 0.5, 0, Math.PI * 2);
      ctx.arc(x + size * 0.5, y - size * 0.2, size * 0.45, 0, Math.PI * 2);
      ctx.arc(x + size, y, size * 0.5, 0, Math.PI * 2);
      ctx.fill();
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      const sky = ctx.createLinearGradient(0, 0, 0, canvas.height);
      sky.addColorStop(0, "#1e3a5f");
      sky.addColorStop(1, "#72b7e8");
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      clouds.forEach(cloud => drawCloud(cloud.x, cloud.y, cloud.size));

      ctx.fillStyle = "#2d6a4f";
      ctx.fillRect(0, groundY, canvas.width, groundHeight);

      ctx.fillStyle = "#1b4332";
      for (let i = 0; i < canvas.width; i += 40) {
        const offset = (frame * speed) % 40;
        ctx.fillRect(i - offset, groundY + 10, 20, 5);
      }

      ctx.fillStyle = "#38bdf8";
      ctx.fillRect(player.x, player.y, player.width, player.height);

      ctx.fillStyle = "#0f172a";
      ctx.fillRect(player.x + 32, player.y + 12, 8, 8);

      ctx.fillStyle = "#ef4444";
      ctx.fillRect(obstacle.x, obstacle.y, obstacle.width, obstacle.height);

      ctx.fillStyle = "white";
      ctx.font = "28px Arial";
      ctx.fillText("Score: " + score, 25, 40);

      if (!gameRunning) {
        ctx.fillStyle = "rgba(0, 0, 0, 0.65)";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        ctx.fillStyle = "white";
        ctx.font = "48px Arial";
        ctx.textAlign = "center";
        ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 20);

        ctx.font = "24px Arial";
        ctx.fillText("Press R to restart", canvas.width / 2, canvas.height / 2 + 25);
        ctx.textAlign = "left";
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
